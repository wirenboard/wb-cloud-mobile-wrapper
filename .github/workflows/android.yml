name: Android

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/wb-cloud-${{ steps.version.outputs.version }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wb-cloud-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/wb-cloud-${{ steps.version.outputs.version }}.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: wb-cloud-${{ needs.build.outputs.version }}

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.build.outputs.version }}
          APK="wb-cloud-${VERSION}.apk"

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, uploading APK..."
            gh release upload "v${VERSION}" "$APK" --clobber
          else
            echo "Creating release v${VERSION}..."
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              --target main \
              "$APK"
          fi
